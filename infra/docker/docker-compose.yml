services:
  postgres:
    image: postgres:16.13
    container_name: affaigent-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - /opt/affaigent/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4.8-alpine
    container_name: affaigent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /opt/affaigent/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: affaigent-qdrant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - /opt/affaigent/data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT}:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD", "bash", "-lc", "</dev/tcp/127.0.0.1/6333"]
      interval: 15s
      timeout: 5s
      retries: 10

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: affaigent-embeddings
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - /opt/affaigent/data/models/tei:/data
    command:
      - --model-id
      - intfloat/multilingual-e5-base
      - --revision
      - 835193815a3936a24a0ee7dc9e3d48c1fbb19c55
      - --port
      - "80"


  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: affaigent-reranker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - /opt/affaigent/data/models/tei-reranker:/data
    command:
      - --model-id
      - BAAI/bge-reranker-v2-m3
      - --port
      - "80"

  api:
    build:
      context: /opt/affaigent/apps/api
      dockerfile: Dockerfile
    container_name: affaigent-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
      APP_PORT: ${APP_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_HTTP_PORT: ${QDRANT_HTTP_PORT}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
